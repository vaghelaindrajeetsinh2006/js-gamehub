<html lang="en">
<head>

<body>
<!-- ================ Navbar  =========== -->

        <nav class="navbar">

                <i class="fa-solid fa-gamepad"></i>
                <span>JS Game Hub</span>

   <div class="canvas">
    <div class="card">

        <div class="color-boxes">
