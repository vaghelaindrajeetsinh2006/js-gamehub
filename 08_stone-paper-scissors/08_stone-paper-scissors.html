<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="08_stone-paper-scissors.css">
    <title> 🎮 Stone Paper Scissors</title>
</head>
<body>
    <!-- ================= Navbar ================= -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fa-solid fa-gamepad"></i>
                <span>JS Game Hub</span>
            </div>

            <div class="nav-links">
                <a href="index.html" target="_blank">Home</a>
                <a target="_blank"href="https://www.youtube.com/watch?v=EGqHVjU-fas&list=PLu71SKxNbfoBuX3f4EOACle2y-tRC5Q37&index=35">YouTube</a>
            </div>

        </nav>
    </header>

    <!-- ================= Main ================= -->

    <main class="main-container">
        <div class="game-card">
            <h1>🎮 Stone Paper Scissors</h1>
            <p class="subtitle">Choose your move and challenge the computer.</p>

            <!-- ================= Choices ================= -->

            <div class="choices">
                <div class="choice" id="stone">
                    <img src="../assets/img/rock.png" alt="Stone">
                </div>

                <div class="choice" id="paper">
                    <img src="../assets/img/paper.png" alt="Paper">
                </div>

                <div class="choice" id="scissors">
                    <img src="../assets/img/scissors.png" alt="Scissors">
                </div>

            </div>

            <!-- ================= Score ================= -->

            <div class="score-board">
                <div class="user">
                    <p id="user-score">0</p>
                    <p>You</p>
                </div>

                <div class="computer">
                    <p id="computer-score">0</p>
                    <p>Computer</p>
                </div>
            </div>

            <!-- ================= Message ================= -->

            <div class="msg-container">
                <p id="message">Play your move!</p>
            </div>

            <!-- ================= Buttons ================= -->

            <div class="reset-container">
                <button id="reset-btn"><i class="fa-solid fa-rotate-right"></i>Reset Game</button>
            </div>
        </div>
    </main>

    <script src="08_stone-paper-scissors.js"></script>
</body>
</html>
