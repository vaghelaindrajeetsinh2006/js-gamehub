<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
    <link rel="stylesheet" href="02_BMICalculator.css">
    <title>🧮 BMI Calculator</title>
</head>
<body>

    <!-- ================ Navbar  =========== -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fa-solid fa-gamepad"></i>
                <span>JS Game Hub</span>
            </div>

            <div class="nav-links">
                <a href="index.html" target="_blank">Home</a>
                <a target="_blank"href="https://www.youtube.com/watch?v=EGqHVjU-fas&list=PLu71SKxNbfoBuX3f4EOACle2y-tRC5Q37&index=35">YouTube</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <div class="main"> 
        <form>
             <h1> BMI Calculator</h1>
            <p><label>Height in CM:</label><input type="text" id="height" /> </p>
            <p><label>weight in KG:</label><input type="text" id="weight" /> </p>
            <button>Calculate</button>
            <div class="result"></div>
            <div class="weight-guide">
                <h2>BMI Guide</h2>
                <p class="under-text">Under weight = less than 18.6</p>
                <p class="under-text">Normal rang = 18.6 and 24.9</p>
                <p class="under-text">Overweight = greater than 24.6</p>
            </div>
        </form>
        </div>
    </div>
    
    <script src="02_BMICalculator.js"></script>
</body>
</html>
